<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brasília Racing | Teaser Oficial</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Orbitron',sans-serif;
  color:white;
  background:#0a0a0a;
  overflow:hidden;
  text-align:center;
}

body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:
  repeating-linear-gradient(
    45deg,
    rgba(255,255,255,0.02) 0px,
    rgba(255,255,255,0.02) 2px,
    transparent 2px,
    transparent 4px
  );
  pointer-events:none;
}

.sweep{
  position:absolute;
  width:200%;
  height:200%;
  background:linear-gradient(120deg,transparent 45%,rgba(255,0,0,0.15),transparent 55%);
  animation:sweep 6s linear infinite;
}
@keyframes sweep{
  from{transform:translateX(-100%) rotate(25deg)}
  to{transform:translateX(100%) rotate(25deg)}
}

.container{
  position:relative;
  z-index:2;
  padding:60px;
  border-radius:20px;
  background:rgba(0,0,0,0.85);
  border:1px solid rgba(255,0,0,0.4);
  box-shadow:0 0 60px rgba(255,0,0,0.5);
}

.logo{
  font-size:50px;
  font-weight:800;
  letter-spacing:4px;
  margin-bottom:10px;
}
.logo span{
  color:#ff1e1e;
  text-shadow:0 0 20px rgba(255,0,0,0.9);
}

.subtitle{
  color:#ccc;
  margin-bottom:25px;
}

.countdown{
  display:flex;
  gap:15px;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:30px;
}
.box{
  background:#111;
  padding:18px;
  border-radius:12px;
  border:1px solid rgba(255,0,0,0.5);
  min-width:80px;
}
.box span{
  display:block;
  font-size:30px;
  color:#ff1e1e;
  font-weight:700;
}

.start-sequence{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:20px;
}
.light{
  width:25px;
  height:25px;
  border-radius:50%;
  background:#330000;
  box-shadow:0 0 10px #000;
}
.light.active{
  background:red;
  box-shadow:0 0 25px red;
}

button{
  margin-top:25px;
  padding:12px 30px;
  border:none;
  border-radius:30px;
  background:#ff1e1e;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  background:#cc0000;
}
</style>
</head>
<body>

<div class="sweep"></div>

<div class="container">
  <div class="logo">BRASÍLIA <span>RACING</span></div>
  <div class="subtitle">Em breve o novo portal de automobilismo do DF</div>

  <div class="countdown">
    <div class="box"><span id="d">0</span>Dias</div>
    <div class="box"><span id="h">0</span>Horas</div>
    <div class="box"><span id="m">0</span>Min</div>
    <div class="box"><span id="s">0</span>Seg</div>
  </div>

  <div class="start-sequence">
    <div class="light"></div>
    <div class="light"></div>
    <div class="light"></div>
    <div class="light"></div>
    <div class="light"></div>
  </div>

  <button onclick="startRace()">🏁 Iniciar Largada</button>

  <!-- Áudio real -->
  <audio id="engineSound" src="assets/sounds/engine.mp3" preload="auto"></audio>

</div>

<script>
const launch = new Date("2026-03-09T00:00:00-03:00").getTime();
setInterval(()=>{
  const now=new Date().getTime();
  const diff=launch-now;

  const d=Math.floor(diff/(1000*60*60*24));
  const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const m=Math.floor((diff%(1000*60*60))/(1000*60));
  const s=Math.floor((diff%(1000*60))/1000);

  document.getElementById("d").innerText=d;
  document.getElementById("h").innerText=h;
  document.getElementById("m").innerText=m;
  document.getElementById("s").innerText=s;
},1000);

async function startRace(){
  const lights=document.querySelectorAll(".light");
  const sound=document.getElementById("engineSound");

  sound.pause();
  sound.currentTime=0;

  for(let i=0;i<lights.length;i++){
    lights[i].classList.add("active");
    await new Promise(r=>setTimeout(r,700));
  }

  await new Promise(r=>setTimeout(r,1000));

  lights.forEach(l=>l.classList.remove("active"));

  sound.play();
}
</script>

</body>
</html>
